services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: jisrvoc
      POSTGRES_PASSWORD: jisrvoc
      POSTGRES_DB: jisrvoc
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jisrvoc"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://jisrvoc:jisrvoc@db:5432/jisrvoc
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }

volumes:
  pgdata:
