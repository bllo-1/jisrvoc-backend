# Section 1 - Product Scope (L1 Taxonomy)
# Source: Jisr VOC Agent Context PDF Section 1
#
# 13 customer-facing scopes.
# The Product Area in every theme title must match one of these scope names exactly
# - no variations, no abbreviations, no legacy names.

scopes:
  - name: "Payroll"
    tribe: "Payroll"
    mental_model_terms:
      - "salaries"
      - "GOSI"
      - "WPS"
      - "deductions"
      - "settlements"
      - "payroll calculations"
      - "compliance submissions"
    keywords:
      - "payroll"
      - "salary"
      - "wage"
      - "payment"
      - "compensation"
      - "pay period"
      - "pay cycle"
      - "payslip"
      - "final settlement"
      - "end of service"
    notes: "Highest-volume scope. Compliance-heavy."

  - name: "Attendance & Leaves"
    tribe: "HRIS"
    sub_tribes:
      - "Attendance and Leaves"
      - "Scheduling"
      - "Leaves and Labour Law"
