# Invalid scope names - never use these
# These are legacy names from v0.2 that no longer exist in the taxonomy
invalid_scope_names:
  - "People Management"
  - "People Mgmt"
  - "Requests"
  - "Settings"
  - "Performance"  # Use "PMS" instead
  - "Attendance"   # Must be "Attendance & Leaves"
