      - "leave"
      - "vacation"
      - "time off"
      - "clock in"
      - "clock out"
      - "punch"
      - "timesheet"
      - "overtime"
      - "shift"
      - "schedule"
      - "roster"
      - "absence"
      - "sick leave"
      - "annual leave"
    notes: "Spans 3 squads - L2 labels disambiguate routing."

