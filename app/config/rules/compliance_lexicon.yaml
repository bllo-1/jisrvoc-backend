# Section 3 - Compliance Lexicon
# Source: Jisr VOC Agent Context PDF Section 3
#
# Any feedback matching terms in this table must be classified as
# Compliance/Legal - the highest Business Impact level.
# Tier and frequency are irrelevant when a regulatory signal is present.
# A match on any single term is sufficient.

regulations:
