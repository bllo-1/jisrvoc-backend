# Additional trigger phrases that indicate compliance/legal context
# These are cross-regulation signals
trigger_phrases:
  - "mandatory"
  - "required by law"
  - "government deadline"
  - "audit"
  - "fine"
  - "penalty"
  - "non-compliance"
  - "legal obligation"
  - "regulatory requirement"
  - "government submission"
  - "active violation"
  - "legal risk"
  - "compliance breach"

# Confidence levels:
# - High: Single term match = compliance flag
# - Medium: 2+ terms match for high confidence
